<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Survey Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:650px;
}

form{
    background:#fff;
    padding:40px;
    border-radius:18px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    color:#2196f3;
    margin-bottom:8px;
    font-size:32px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:35px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

input[type="text"],
select,
textarea{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
    outline:none;
}

input[type="text"]:focus,
select:focus,
textarea:focus{
    border-color:#2196f3;
    box-shadow:0 0 10px rgba(33,150,243,.2);
}

textarea{
    resize:vertical;
}

fieldset{
    margin-top:25px;
    border:none;
    background:#f8f9fc;
    padding:20px;
    border-radius:12px;
}

legend{
    font-weight:600;
    color:#2196f3;
    padding:0 8px;
}

.radio-group{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:10px;
}

.radio-option{
    background:#fff;
    border:2px solid #ddd;
    border-radius:10px;
    padding:12px;
    cursor:pointer;
    transition:.3s;
}

.radio-option:hover{
    border-color:#2196f3;
    background:#eef7ff;
}

.radio-option input{
    margin-right:8px;
}

button{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#2196f3,#00c6ff);
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(33,150,243,.4);
}

button:active{
    transform:scale(.98);
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#888;
    font-size:14px;
}

@media(max-width:600px){

form{
    padding:25px;
}

.radio-group{
    grid-template-columns:1fr;
}

h1{
    font-size:26px;
}

}

</style>

</head>
<body>

<div class="container">

<form id="SurveySheet">

<h1>📝 Customer Survey</h1>

<p class="subtitle">
We value your feedback. Please complete the form below.
</p>

<label>Name</label>
<input
type="text"
name="name"
placeholder="Enter your full name"
required>

<label>Gender</label>

<select name="gender">
<option value="">Choose your gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<fieldset>

<legend>Age Group</legend>

<div class="radio-group">

<label class="radio-option">
<input type="radio" name="ageGroup" value="Under 18">
Under 18
</label>

<label class="radio-option">
<input type="radio" name="ageGroup" value="18-30">
18 - 30
</label>

<label class="radio-option">
<input type="radio" name="ageGroup" value="31-50">
31 - 50
</label>

<label class="radio-option">
<input type="radio" name="ageGroup" value="51+">
51+
</label>

</div>

</fieldset>

<label>Comments</label>

<textarea
name="comments"
rows="5"
placeholder="Write your comments here..."></textarea>

<button type="submit">
Submit Survey
</button>

<div class="footer">
Thank you for taking the time to answer our survey ❤️
</div>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzLbHVQQhQ85-4g3eeKhzGE6FdydWwSTCr1O0FCfuqFN8RAcKGRT5zqj7AxDOeVMFJJ/exec";

const form=document.getElementById("SurveySheet");

form.addEventListener("submit",e=>{

e.preventDefault();

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})

.then(response=>{

alert("🎉 Thank you! Your survey has been submitted successfully.");

form.reset();

})

.catch(error=>{

alert("❌ Something went wrong. Please try again.");

});

});

</script>

</body>
</html>
